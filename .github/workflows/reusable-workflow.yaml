name: Reusable Workflow
on:
    workflow_call:
        inputs:
            run-test:
                required: false
                type: boolean
                default: false
            run-build:
                required: false
                type: boolean
                default: false
jobs:
    testandbuild:
        runs-on: ubuntu-latest
        steps:
            - name: Get code
              uses: actions/checkout@v6
            - name: Cache dependencies
              id: cache
              uses: actions/cache@v5
              with:
                path: ~/.npm
                key: deps-node-modules-${{ hashFiles('**/package-lock.json') }}
            - name: Install dependencies
              run: npm ci
            
            #### ONLY For Test Phase ####
            - name: Test code
              if: inputs.run-test
              id: test-code
              run: npm run test
            - name: Upload test report
              if: failure() && steps.test-code.outcome == 'failure'
              uses: actions/upload-artifact@v7
              with:
                name: test-report
                path: test.json
            
            #### ONLY for Build Phase ####
            - name: Build website
              if: inputs.run-build
              id: build-website
              run: npm run build
            - name: Upload artifacts
              if: inputs.run-build
              uses: actions/upload-artifact@v7
              with:
                name: dist-files
                path: dist
            