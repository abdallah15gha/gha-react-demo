name: Website Deployment
on:
  push:
    branches:
      - main
jobs:
  test:
    uses: ./.github/workflows/reusable-workflow.yaml
    with:
      run-test: true
      greeting: Enas

  build:
    uses: ./.github/workflows/reusable-workflow.yaml
    with:
      run-build: true

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Get build artifacts
        uses: actions/download-artifact@v8
        with:
          name: dist-files
      - name: Output contents
        run: ls
      - name: Deploy
        run: echo "Deploying..."

  report:
    needs: deploy
    if: success()
    runs-on: ubuntu-latest
    steps:
      - name: Report on Success
        run: |
            echo "All Steps Works Well :)"
            echo '${{ toJson(github) }}'

