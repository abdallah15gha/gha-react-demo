name: A Deploy Workflow
on:
  pull_request:
    types:
      - opened
      - edited
  push:
    branches:
      - main
      - 'dev-*'
    # paths-ignore:
    #   - '.github/workflows/*'
  workflow_dispatch:
env:
  DATABASE_NAME: gha-iti
jobs:
  test:
    runs-on: ubuntu-latest
    env:
      DATABASE_USER: gha-abdo
      DATABASE_PASS: gha-pass
    steps:
      - name: Get the Code Inside the Runner
        uses: actions/checkout@v6
      - name: Install Dependencies
        run: npm ci
      - name: Test the Operation
        run: npm run test
      - name: Test the env Variables
        run: |
            echo "Using  ENV Variables ..."
            echo $DATABASE_NAME
            echo "The user is -> $DATABASE_USER"
  build:
    needs: test
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version-one.outputs.version }}
    steps:
      - name: Get the Code
        uses: actions/checkout@v6
      - name: Install Dependencies
        run: npm ci
      - name: Build
        run: npm run build
      - name: Output the Version
        id: version-one
        run: echo "version=1.0.0" >> $GITHUB_OUTPUT
      - name: Upload Artifacts
        uses: actions/upload-artifact@v7
        with:
          name: dist-artifact
          path: dist
  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download the built artifacts
        uses: actions/download-artifact@v8
        with:
          name: dist-artifact
      - name: Output the content
        run: ls
      - name: Get the previous Output
        run: echo "Using Version ${{ needs.build.outputs.version }}"
      - name: Deploy the Project
        run: |
            echo "Deploying ..."
            sleep 10
            echo "Deployed Successfully :D"